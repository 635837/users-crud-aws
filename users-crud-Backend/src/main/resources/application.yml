server:
  port: 8080

spring:
  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:3306/${DB_NAME:appdb}?serverTimezone=UTC&sslMode=PREFERRED
    username: ${DB_USER:admin}
    password: ${DB_PASS:changeme}
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      pool-name: users-crud-hikari

  jpa:
    hibernate:
      ddl-auto: none
    open-in-view: false
    show-sql: false
    properties:
      hibernate:
        "[format_sql]": true

  # ✅ THIS IS THE MISSING PIECE
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: https://cognito-idp.us-east-1.amazonaws.com/us-east-1_FN6gpbY4X

management:
  endpoints:
    web:
      exposure:
        include: health,info