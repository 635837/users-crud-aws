server:
  port: 8080

spring:
  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:3306/${DB_NAME:appdb}?serverTimezone=UTC&sslMode=PREFERRED
    username: ${DB_USER:admin}
    password: ${DB_PASS:changeme}
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      pool-name: users-crud-hikari
  jpa:
    hibernate:
      ddl-auto: none     # You already created the table with SQL. If you want Hibernate to create/update, use 'update'.
    open-in-view: false
    show-sql: false
    properties:
      hibernate:
        "[format_sql]": true

management:
  endpoints:
    web:
      exposure:
        include: health,info
