<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Users CRUD</title>
  <style>
    :root{
      --bg:#0f172a; --card:#111827; --muted:#1f2937; --text:#e5e7eb;
      --accent:#22d3ee; --accent-2:#a78bfa; --ok:#34d399; --bad:#f87171;
      --shadow: 0 20px 60px rgba(0,0,0,.35);
      --border: rgba(255,255,255,.22);
      --border-soft: rgba(255,255,255,.12);
    }
    *{ box-sizing: border-box; }
    body{
      margin:0; padding:0;
      background: radial-gradient(900px 520px at 20% 10%, rgba(56,189,248,.08), transparent 60%),
                  radial-gradient(700px 460px at 90% 20%, rgba(167,139,250,.08), transparent 60%),
                  var(--bg);
      color:var(--text);
      font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Ubuntu, Cantarell, Noto Sans, Helvetica Neue, Arial;
    }
    .wrap{ max-width:980px; margin:0 auto; padding:38px 18px 70px; }
    h1{ margin: 0 0 20px; font-size: clamp(26px, 4.8vw, 40px); font-weight: 800; letter-spacing:.2px; color:#fff; text-shadow: 0 2px 24px rgba(0,0,0,.28); }
    h2{ margin: 20px 0 10px; font-size: clamp(16px, 2.2vw, 20px); font-weight: 700; color:#fff; }

    .form-row{ display:flex; gap:10px; flex-wrap:wrap; align-items:center; margin: 12px 0 22px; }
    .form-row input{
      background:#fff; color:#0b1220; border: 1px solid var(--border); border-radius:4px; padding:10px 12px; min-width: 220px; outline:none;
      transition: box-shadow .15s ease, border-color .15s ease;
    }
    .form-row input:focus{ border-color: var(--accent); box-shadow: 0 0 0 4px rgba(34,211,238,.15); }

    .btn{ border:none; border-radius:4px; padding:10px 14px; cursor:pointer; background:#e5e7eb; color:#111827; font-weight:700; transition: transform .06s ease, filter .15s ease; }
    .btn:hover{ filter: brightness(0.95); transform: translateY(-1px); }
    .btn:active{ transform: translateY(0); }
    .btn.primary{ background: linear-gradient(90deg, var(--accent), var(--accent-2)); color:#071017; }
    .btn.danger{ background: linear-gradient(90deg, #ef4444, #dc2626); color:#fff; }
    .btn.secondary{ background:#e5e7eb; color:#111827; }

    .subhead{ margin: 22px 0 10px; font-weight:700; }

    .table-wrap{ overflow:auto; }
    table{
      width:100%; border-collapse: collapse; min-width: 600px; background: transparent;
      border:1px solid var(--border); border-radius:4px; overflow:hidden;
    }
    thead th{
      text-align:left; padding:12px 14px; background: rgba(255,255,255,.06);
      border-right: 1px solid var(--border); font-weight: 700;
    }
    thead th:last-child{ border-right: none; }
    tbody td{
      padding:12px 14px; border-top: 1px solid var(--border-soft);
      border-right: 1px solid var(--border-soft);
    }
    tbody td:last-child{ border-right: none; }
    tbody tr:hover{ background: rgba(255,255,255,.03); }
    .actions-cell{ display:flex; gap:8px; flex-wrap:wrap; }

    .top-actions{ display:flex; gap:10px; align-items:center; margin-top:6px; flex-wrap:wrap; }
    .pill{
      padding:6px 10px; border-radius:999px; font-size:12px; font-weight:700;
      color:#052021; background: linear-gradient(90deg, var(--accent), var(--accent-2));
    }

    .toast-wrap{ position: fixed; right:18px; bottom:18px; display:flex; flex-direction:column; gap:10px; z-index:50; }
    .toast{
      min-width: 280px; max-width: 420px; padding:12px 14px; border-radius:10px;
      border:1px solid rgba(255,255,255,.08);
      background: linear-gradient(180deg, rgba(255,255,255,.08), rgba(255,255,255,.03));
      box-shadow: var(--shadow); display:flex; align-items:flex-start; gap:10px;
      animation: toastIn .22s ease;
    }
    .toast.ok{ border-color: rgba(52,211,153,.35); }
    .toast.err{ border-color: rgba(248,113,113,.35); }
    .spin { width:16px; height:16px; border:3px solid rgba(255,255,255,.2); border-top-color: var(--accent); border-radius:50%; animation: sp .8s linear infinite; margin-top:2px; }
    @keyframes sp{ to{ transform: rotate(360deg);} }
    @keyframes toastIn{ from{ transform: translateY(10px); opacity:0;} to{ transform: translateY(0); opacity:1;} }

    .skeleton-row td{ position:relative; height:42px; }
    .skeleton-row td::after{
      content:""; position:absolute; inset: 8px; border-radius:4px;
      background: linear-gradient(90deg, rgba(255,255,255,.08), rgba(255,255,255,.02), rgba(255,255,255,.08));
      background-size: 220% 100%; animation: shimmer 1.2s ease-in-out infinite;
    }
    @keyframes shimmer{ 0%{ background-position: 200% 0;} 100%{ background-position: -200% 0;} }

    .note{ color:#cbd5e1; font-size:12px; margin-top:10px; opacity:.9; }
    .debug{ font-size:12px; opacity:.9; margin-top:8px; }
    .debug code{ background:rgba(0,0,0,.25); padding:2px 6px; border-radius:4px;}
  </style>
</head>
<body>
  <div class="wrap">
    <h1>Users CRUD</h1>

    <h2>Create User</h2>
    <div class="form-row">
      <input id="id" type="number" placeholder="ID (required)"/>
      <input id="name" type="text" placeholder="Name"/>
      <input id="email" type="email" placeholder="Email"/>
      <button id="addBtn" class="btn primary">Add</button>
    </div>

    <div class="top-actions">
      <span id="authStatus" class="pill">Auth OFF</span>
      <button id="loginBtn" class="btn secondary" style="display:none">Login</button>
      <button id="logoutBtn" class="btn secondary" style="display:none">Logout</button>
      <button id="refreshBtn" class="btn secondary">Reload</button>
      <span id="resultCount" style="opacity:.9;">0 records</span>
    </div>

    <h2 class="subhead">Users</h2>
    <div class="table-wrap">
      <table id="usersTable">
        <thead>
          <tr>
            <th style="width:140px;">ID</th>
            <th>Name</th>
            <th>Email</th>
            <th style="width:220px;">Actions</th>
          </tr>
        </thead>
        <tbody id="tbody"></tbody>
      </table>
    </div>

    <div class="note">
      Tip: Use <b>Edit</b> to load the record into the top inputs, then press <b>Add</b> to create another or <b>Save</b> to update.
      <div class="debug">Debug: Token present? <code id="dbgTok">false</code></div>
    </div>
  </div>

  <!-- TOASTS -->
  <div class="toast-wrap" id="toastWrap"></div>

  <script>
    /***********************
     * CONFIG — EDIT HERE  *
     ***********************/
    const CONFIG = {
      // ✅ API Gateway (HTTP API) invoke URL — you are using $default stage (no /prod)
      API_BASE_URL: "https://01sdtstthi.execute-api.us-east-1.amazonaws.com",

      // 🔐 Turn ON to use Cognito Hosted UI + send Authorization: Bearer <token>
      USE_AUTH: true,

      // ⚠️ IMPORTANT:
      //  - COGNITO_DOMAIN = JUST the domain host (NO "https://")
      //  - Use the exact domain shown in Cognito → App integration → Domain.
      //  - Example: "myapp-demo.auth.us-east-1.amazoncognito.com"
      //  - Do NOT use user-pool-id here.
      COGNITO: {
        COGNITO_DOMAIN: "us-east-1fn6gpby4x.auth.us-east-1.amazoncognito.com", // <-- REPLACE THIS
        CLIENT_ID: "78oe0famr77vef10b5euavnfqp",                               // <-- Your App client id
        REDIRECT_URI: "https://d6wztq0o0w1ws.cloudfront.net/",
        LOGOUT_REDIRECT_URI: "https://d6wztq0o0w1ws.cloudfront.net/",
        TOKEN_USE: "id" // keep "id" to match API GW authorizer (aud = App Client ID)
      }
    };

    /***********************
     * UTILITIES + STATE   *
     ***********************/
    const qs = (s, el=document)=> el.querySelector(s);
    const qsa = (s, el=document)=> [...el.querySelectorAll(s)];
    const tbody = qs('#tbody');
    const toastWrap = qs('#toastWrap');
    const authStatus = qs('#authStatus');
    const loginBtn = qs('#loginBtn');
    const logoutBtn = qs('#logoutBtn');
    const refreshBtn = qs('#refreshBtn');
    const resultCount = qs('#resultCount');
    const dbgTok = qs('#dbgTok');

    const inputId = qs('#id');
    const inputName = qs('#name');
    const inputEmail = qs('#email');
    const addBtn = qs('#addBtn');

    const state = { token:null, users:[], editingId:null, loading:false };

    function showToast(message, type="ok"){
      const el = document.createElement('div');
      el.className = `toast ${type === 'ok' ? 'ok' : 'err'}`;
      el.innerHTML = `
        <div class="spin" style="border-top-color:${type==='ok' ? 'var(--ok)':'var(--bad)'}"></div>
        <div>${message}</div>
      `;
      toastWrap.appendChild(el);
      setTimeout(()=>{
        el.style.transition = 'transform .2s ease, opacity .2s ease';
        el.style.transform = 'translateY(8px)';
        el.style.opacity = '0';
        setTimeout(()=> el.remove(), 250);
      }, 2200);
    }

    function setAuthUI(){
      if(CONFIG.USE_AUTH){
        const on = Boolean(state.token);
        authStatus.textContent = on ? 'Auth ON' : 'Auth OFF';
        loginBtn.style.display = on ? 'none' : 'inline-flex';
        logoutBtn.style.display = on ? 'inline-flex' : 'none';
      } else {
        authStatus.textContent = 'Auth OFF';
        loginBtn.style.display = 'none';
        logoutBtn.style.display = 'none';
      }
      dbgTok.textContent = Boolean(state.token);
    }

    function renderSkeletonRows(count=5){
      tbody.innerHTML = '';
      for(let i=0;i<count;i++){
        const tr = document.createElement('tr');
        tr.className = 'skeleton-row';
        tr.innerHTML = `<td></td><td></td><td></td><td></td>`;
        tbody.appendChild(tr);
      }
    }

    function escapeHtml(str){
      return String(str).replace(/[&<>\"']/g, (m)=>({
        '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'
      })[m]);
    }

    function clearInputs(){
      inputId.value = '';
      inputName.value = '';
      inputEmail.value = '';
      state.editingId = null;
      addBtn.textContent = 'Add';
      addBtn.classList.add('primary');
    }

    function loadIntoInputs(u){
      inputId.value = u.id ?? '';
      inputName.value = u.name ?? '';
      inputEmail.value = u.email ?? '';
      state.editingId = u.id;
      addBtn.textContent = 'Save';
      addBtn.classList.remove('primary');
    }

    function renderUsers(){
      tbody.innerHTML = '';
      state.users.forEach(u=>{
        const tr = document.createElement('tr');
        tr.innerHTML = `
          <td>${u.id ?? ''}</td>
          <td>${escapeHtml(u.name ?? '')}</td>
          <td>${escapeHtml(u.email ?? '')}</td>
          <td class="actions-cell">
            <button class="btn secondary" data-edit="${u.id}">Edit</button>
            <button class="btn danger" data-del="${u.id}">Delete</button>
          </td>
        `;
        tbody.appendChild(tr);
      });
      resultCount.textContent = `${state.users.length} record${state.users.length===1?'':'s'}`;

      qsa('button[data-edit]').forEach(b=>{
        b.addEventListener('click', ()=>{
          const id = b.getAttribute('data-edit');
          const user = state.users.find(x=> String(x.id) === String(id));
          if(user) loadIntoInputs(user);
        });
      });
      qsa('button[data-del]').forEach(b=>{
        b.addEventListener('click', async ()=>{
          const id = b.getAttribute('data-del');
          if(!id) return;
          if(!confirm(`Delete user #${id}?`)) return;
          await deleteUser(id);
        });
      });
    }

    function authHeader(){
      if(CONFIG.USE_AUTH && state.token){
        return { 'Authorization': `Bearer ${state.token}` };
      }
      return {};
    }

    function getTokenFromHash(){
      if(!CONFIG.USE_AUTH) return;
      const hash = window.location.hash ? window.location.hash.substring(1) : '';
      const params = new URLSearchParams(hash);
      const idToken = params.get('id_token');
      const accessToken = params.get('access_token');
      const expiresIn = params.get('expires_in');

      const chosen = (CONFIG.COGNITO.TOKEN_USE === 'access') ? accessToken : idToken;
      if(chosen){
        localStorage.setItem('cognito_token', chosen);
        localStorage.setItem('cognito_token_expires_in', String(Date.now() + (Number(expiresIn || 3600) * 1000)));
        // clean the hash so refresh doesn't keep tokens in URL
        history.replaceState(null, document.title, window.location.pathname + window.location.search);
      }
      state.token = localStorage.getItem('cognito_token');
    }

    function authLogin(){
      const d = CONFIG.COGNITO;
      // Build Hosted UI login URL
      const url = new URL(`https://${d.COGNITO_DOMAIN}/login`);
      url.searchParams.set('client_id', d.CLIENT_ID);
      url.searchParams.set('response_type', 'token'); // implicit flow
      url.searchParams.set('scope', 'openid email profile');
      url.searchParams.set('redirect_uri', d.REDIRECT_URI);
      url.searchParams.set('state', 'crud-users');
      window.location.assign(url.toString());
    }
    function authLogout(){
      localStorage.removeItem('cognito_token');
      localStorage.removeItem('cognito_token_expires_in');
      state.token = null;
      const d = CONFIG.COGNITO;
      const url = new URL(`https://${d.COGNITO_DOMAIN}/logout`);
      url.searchParams.set('client_id', d.CLIENT_ID);
      url.searchParams.set('logout_uri', d.LOGOUT_REDIRECT_URI);
      window.location.assign(url.toString());
    }

    /***********************
     * API CALLS           *
     ***********************/
    async function fetchUsers(){
      try{
        state.loading = true;
        renderSkeletonRows(6);
        const res = await fetch(`${CONFIG.API_BASE_URL}/users`, {
          headers: { 'Accept':'application/json', ...authHeader() }
        });
        if(res.status === 401){ throw new Error('401 Unauthorized – login first'); }
        if(!res.ok){
          const txt = await res.text();
          throw new Error(`GET /users failed (${res.status}) ${txt}`);
        }
        const data = await res.json();
        state.users = Array.isArray(data) ? data : (Array.isArray(data.items) ? data.items : []);
        renderUsers();
        showToast('Users loaded','ok');
      } catch(err){
        console.error(err);
        tbody.innerHTML = '';
        resultCount.textContent = '0 records';
        showToast(err.message || 'Failed to load users','err');
      } finally {
        state.loading = false;
      }
    }

    function validateInputs({ requireIdForCreate=false }={}){
      const idStr = String(inputId.value || '').trim();
      const name = String(inputName.value || '').trim();
      const email = String(inputEmail.value || '').trim();
      if(requireIdForCreate && !idStr){ showToast('ID is required','err'); inputId.focus(); return null; }
      if(!name){ showToast('Name is required','err'); inputName.focus(); return null; }
      if(!email || !/^\S+@\S+\.\S+$/.test(email)){ showToast('Valid email is required','err'); inputEmail.focus(); return null; }
      return { id: idStr ? Number(idStr) : undefined, name, email };
    }

    async function createUser(payload){
      const res = await fetch(`${CONFIG.API_BASE_URL}/users`, {
        method:'POST',
        headers:{ 'Content-Type':'application/json', 'Accept':'application/json', ...authHeader() },
        body: JSON.stringify(payload)
      });
      if(res.status === 401){ throw new Error('401 Unauthorized – login first'); }
      if(!res.ok){
        const txt = await res.text();
        throw new Error(`POST /users failed (${res.status}) ${txt}`);
      }
    }

    async function putUser(id, payload){
      const res = await fetch(`${CONFIG.API_BASE_URL}/users/${encodeURIComponent(id)}`, {
        method:'PUT',
        headers:{ 'Content-Type':'application/json', 'Accept':'application/json', ...authHeader() },
        body: JSON.stringify(payload)
      });
      if(res.status === 401){ throw new Error('401 Unauthorized – login first'); }
      if(!res.ok){
        const txt = await res.text();
        throw new Error(`PUT /users/${id} failed (${res.status}) ${txt}`);
      }
    }

    async function deleteUser(id){
      const res = await fetch(`${CONFIG.API_BASE_URL}/users/${encodeURIComponent(id)}`, {
        method:'DELETE',
        headers:{ 'Accept':'application/json', ...authHeader() }
      });
      if(res.status === 401){ throw new Error('401 Unauthorized – login first'); }
      if(!res.ok){
        const txt = await res.text();
        throw new Error(`DELETE /users/${id} failed (${res.status}) ${txt}`);
      }
      await fetchUsers();
      showToast(`User #${id} deleted`,'ok');
      if(String(state.editingId) === String(id)) clearInputs();
    }

    /***********************
     * EVENTS + INIT       *
     ***********************/
    addBtn.addEventListener('click', async ()=>{
      try{
        const payload = validateInputs({ requireIdForCreate: state.editingId==null });
        if(!payload) return;
        if(state.editingId==null){
          await createUser(payload);
          showToast('User created','ok');
        }else{
          const id = state.editingId;
          await putUser(id, { name: payload.name, email: payload.email });
          showToast(`User #${id} updated`,'ok');
        }
        await fetchUsers();
        clearInputs();
      }catch(err){
        console.error(err);
        showToast(err.message || 'Operation failed','err');
      }
    });

    refreshBtn.addEventListener('click', fetchUsers);
    loginBtn.addEventListener('click', authLogin);
    logoutBtn.addEventListener('click', authLogout);

    (function init(){
      if(CONFIG.USE_AUTH){ getTokenFromHash(); }
      setAuthUI();
      fetchUsers();
    })();
  </script>
</body>
</html>
